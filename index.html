<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lurico Appliance Repair</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Montserrat', Arial, sans-serif;
  margin:0;
  background:#f5f5f5;
  line-height:1.6;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background:#0d6efd;
  color:white;
}

/* LOGO */
.logo {
  height:40px;
  width:auto;
}

.logo-wrap {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-text strong {
  font-size:18px;
}

.logo-text span {
  font-size:12px;
  color:#ddd;
}

/* CALL */
.header-call {
  color:white;
  text-decoration:none;
  font-weight:600;
}

/* HERO */
.hero {
  padding:80px 20px;
  text-align:center;
  background:white;
}

.hero h1 {
  font-size:36px;
  font-weight:700;
}

.hero p {
  font-size:18px;
}

/* BUTTONS */
.btn {
  display:inline-block;
  margin:8px;
  padding:14px 22px;
  background:#ff6600;
  color:white;
  border-radius:6px;
  text-decoration:none;
  font-weight:600;
}

/* SECTIONS */
.section {
  padding:60px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

h2 {
  font-size:26px;
  font-weight:700;
}

/* CARDS */
.grid {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  max-width:1000px;
}

.card {
  background:white;
  padding:25px;
  border-radius:12px;
  width:260px;
  border:1px solid #eee;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* FORM */
.form {
  background:white;
  padding:25px;
  border-radius:12px;
  max-width:420px;
  width:100%;
}

input, textarea {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button {
  background:#0d6efd;
  color:white;
  border:none;
  padding:15px;
  width:100%;
  border-radius:6px;
}

/* FIXED BUTTON */
.call-fixed {
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  background:#ff6600;
  color:white;
  padding:15px 25px;
  border-radius:50px;
  text-decoration:none;
}

/* MOBILE */
@media (max-width:600px){

.header {
  flex-direction:column;
  gap:10px;
}

.logo {
  height:32px;
}

.btn {
  display:block;
  width:100%;
}

.grid {
  flex-direction:column;
  align-items:center;
}

.card {
  width:100%;
  max-width:320px;
}

}
</style>
</head>

<body>

<div class="header">
  <div class="logo-wrap">
    <img src="logo.png" alt="Lurico" class="logo">
    <div class="logo-text">
      <strong>LURICO</strong>
      <span>Appliance Repair</span>
    </div>
  </div>

  <a href="tel:+19543055539" class="header-call">📞 954-305-5539</a>
</div>

<div class="hero">
<h1>Same-Day Appliance Repair</h1>
<p>Fast • Reliable • Affordable</p>

<a href="tel:+19543055539" class="btn">📞 Call Now</a>
<a href="sms:+19543055539" class="btn">💬 Text Us</a>
<a href="https://wa.me/19543055539" class="btn">🟢 WhatsApp</a>
</div>

<div class="section">
<h2>We Repair All Major Appliances</h2>

<div class="grid">

<div class="card"><h3>❄️ Refrigerators</h3></div>
<div class="card"><h3>🧺 Washers</h3></div>
<div class="card"><h3>🔥 Dryers</h3></div>
<div class="card"><h3>🍽 Dishwashers</h3></div>
<div class="card"><h3>🍳 Ovens</h3></div>
<div class="card"><h3>❄️ AC Units</h3></div>

</div>
</div>

<div class="section">
<h2>Get a Free Quote</h2>

<form action="https://formspree.io/f/mdaplrvq" method="POST" class="form">
<input type="text" name="name" placeholder="Your Name" required>
<input type="tel" name="phone" placeholder="Phone Number" required>
<textarea name="message" placeholder="What needs repair?" required></textarea>
<button type="submit">Send Request</button>
</form>

</div>

<a href="tel:+19543055539" class="call-fixed">📞 Call Now</a>

</body>
</html>
